<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FuelFinder — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #f8fafc;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 1.5rem;
      text-align: center;
    }
    .icon {
      width: 64px; height: 64px;
      background: #1e293b;
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
    }
    h1 { font-size: 1.25rem; font-weight: 700; }
    p  { font-size: 0.875rem; color: #94a3b8; max-width: 280px; line-height: 1.5; }
    button {
      margin-top: 0.5rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 0.75rem 1.75rem;
      font-size: 0.875rem;
      font-weight: 700;
      cursor: pointer;
    }
    button:active { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="icon">⛽</div>
  <h1>You&rsquo;re offline</h1>
  <p>FuelFinder needs an internet connection to show live prices. Check your connection and try again.</p>
  <button onclick="location.reload()">Try again</button>
</body>
</html>
